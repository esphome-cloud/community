name: AI Triage

# V-ADR-001 / V-ADR-003 / V-PHASE-02 forbidden-behavior:
# .on MUST have exactly two keys: `issues` and `discussion`.
# NEVER add `push`, `pull_request`, `workflow_dispatch`, or `schedule` here
# without a paired ADR re-evaluation — every extra trigger multiplies
# Claude API cost and creates a non-issue surface for AI traffic.
# tests/repo/yamllint_workflows.sh enforces `.on | keys == [issues, discussion]`.

on:
  issues:
    types: [opened, edited]
  discussion:
    types: [created]

# Task 0.4 broadens permissions: triage.py labels, comments, and closes
# issues; the workflow's GITHUB_TOKEN needs the corresponding write scopes.
permissions:
  contents: read
  issues: write
  discussions: write

# Serialise per-issue triage so two rapid edits don't fight each other.
# At the workflow level this keeps the global ai-triage cost bounded too.
concurrency:
  group: ai-triage-${{ github.event.issue.number || github.event.discussion.number }}
  cancel-in-progress: false

jobs:
  triage:
    runs-on: ubuntu-latest
    # p95 round-trip <90s per Task 0.4 acceptance #5; 5-min ceiling stays as
    # safety net for cold runners.
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: install dependencies
        run: pip install -r scripts/requirements.txt

      # Step name "python ok" carries the smoke marker that
      # tests/integration/workflow_smoke.sh (Task 0.3) still greps for.
      # scripts/triage.py also emits the Task 0.4 marker
      # `triage.classified{issue:<N>, category:<C>, cost_usd:<X>}`
      # to stderr, which workflow_smoke.sh's successor (triage_logs.sh)
      # asserts on every run.
      - name: python ok — triage
        env:
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
          SMTP_HOST:         ${{ secrets.SMTP_HOST }}
          SMTP_USER:         ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:     ${{ secrets.SMTP_PASSWORD }}
          ALERT_EMAIL:       ${{ secrets.ALERT_EMAIL }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/triage.py --repo "$GITHUB_REPOSITORY"
