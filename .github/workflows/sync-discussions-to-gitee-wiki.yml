name: Sync Discussions to Gitee Mirror

# Phase 2 enhancement — mirrors GitHub Discussions as markdown pages.
# Gitee has no native Discussions feature. This workflow generates static
# .md files in docs/discussions/ which are then picked up by the existing
# mirror-to-gitee.yml workflow and synced to the Gitee read-only mirror.
#
# Why this approach (not Gitee Wiki):
#   - Gitee Wiki requires manual UI initialization before first git push.
#   - Committing to the main repo piggybacks on the proven mirror pipeline.
#   - Zero additional secrets/infra: no SSH key, no API token, no wiki repo.
#
# Limitations (by design, per ADR-004):
#   - Read-only one-way: GitHub → Gitee mirror. Edits on Gitee are overwritten.
#   - Drift: ≤6h + 2× workflow runtime (~3min total). Discussions are not
#     latency-sensitive.

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  discussions: read

concurrency:
  group: sync-discussions-mirror
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch GitHub Discussions via GraphQL
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api graphql --paginate -f query='
            query($cursor: String) {
              repository(owner: "esphome-cloud", name: "community") {
                discussions(first: 100, after: $cursor,
                            orderBy: {field: CREATED_AT, direction: DESC}) {
                  pageInfo { hasNextPage endCursor }
                  nodes {
                    number
                    title
                    url
                    category { name slug }
                    createdAt
                    body
                    answer { body }
                    comments(first: 100) {
                      nodes {
                        author { login }
                        body
                        createdAt
                      }
                    }
                  }
                }
              }
            }' > /tmp/discussions.json

      - name: Generate discussion pages
        run: |
          python3 << 'PYEOF'
          import json, os, re, shutil
          from pathlib import Path

          with open("/tmp/discussions.json") as f:
              raw = json.load(f)

          discussions = []
          pages = raw if isinstance(raw, list) else [raw]
          for page in pages:
              nodes = (page.get("data", {})
                           .get("repository", {})
                           .get("discussions", {})
                           .get("nodes", []))
              discussions.extend(nodes)

          if not discussions:
              print("No discussions found — nothing to sync.")
              exit(0)

          out = Path("docs/discussions")
          # Clean slate each sync
          if out.exists():
              shutil.rmtree(out)
          out.mkdir(parents=True)

          def slug(title, number):
              safe = title[:60]
              safe = re.sub(r'[^\w\s-]', '', safe, flags=re.ASCII)
              safe = re.sub(r'[-\s]+', '-', safe).strip('-').lower()
              return f"{number}-{safe}.md" if safe else f"{number}.md"

          cats = {}
          for d in discussions:
              cat_slug = d["category"]["slug"]
              if cat_slug not in cats:
                  cats[cat_slug] = {"name": d["category"]["name"], "items": []}
              cats[cat_slug]["items"].append(d)

          # Per-category index and discussion pages
          for cat_slug, cat in sorted(cats.items()):
              cat_dir = out / cat_slug
              cat_dir.mkdir(exist_ok=True)

              for d in cat["items"]:
                  filename = slug(d["title"], d["number"])
                  filepath = cat_dir / filename

                  with open(filepath, "w", encoding="utf-8") as f:
                      f.write(f'# {d["title"]}\n\n')
                      f.write(f'> **分类**: {d["category"]["name"]}')
                      f.write(f' | **创建**: {d["createdAt"]}')
                      f.write(f' | **#{d["number"]}**\n')
                      f.write(f'> 此页面由 sync-discussions workflow 自动生成，**只读**。\n')
                      f.write(f'> 原帖: [{d["url"]}]({d["url"]})\n\n')
                      f.write('---\n\n')

                      if d.get("body"):
                          f.write(d["body"].strip() + "\n\n")

                      answer = d.get("answer")
                      if answer and answer.get("body"):
                          f.write('---\n\n## 已采纳的回答\n\n')
                          f.write(answer["body"].strip() + "\n\n")

                      comments = d.get("comments", {}).get("nodes", [])
                      if comments:
                          f.write('---\n\n## 评论\n\n')
                          for c in comments:
                              f.write(f'**{c["author"]["login"]}** ({c["createdAt"]}):\n\n')
                              f.write(c["body"].strip() + "\n\n---\n\n")

                      f.write(f'\n> 自动同步自 [GitHub Discussion #{d["number"]}]({d["url"]})')
                      f.write(' | 请勿在此编辑\n')

          # Top-level README for the discussions mirror directory
          with open(out / "README.md", "w", encoding="utf-8") as f:
              f.write("# Discussions 镜像\n\n")
              f.write("> 只读镜像 — 参与讨论请访问")
              f.write(" [GitHub Discussions](https://github.com/esphome-cloud/community/discussions)\n\n")
              f.write("GitHub 访问困难？发邮件到 feedback@esphome.cloud\n\n")
              f.write("---\n\n")
              for cat_slug in sorted(cats.keys()):
                  cat = cats[cat_slug]
                  f.write(f"## {cat['name']}\n\n")
                  for d in sorted(cat["items"], key=lambda x: x["createdAt"], reverse=True):
                      filename = slug(d["title"], d["number"])
                      f.write(f"- [{d['title']}]({cat_slug}/{filename})  ")
                      f.write(f"({d['createdAt'][:10]})\n")
                  f.write("\n")

          print(f"Generated {len(discussions)} discussion page(s) across {len(cats)} categories.")
          PYEOF

      - name: Commit and push changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/discussions/
          if git diff --cached --quiet; then
            echo "No changes to discussions mirror."
          else
            git commit -m "sync: discussions mirror $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            git push origin main
            echo "Discussions mirror synced. mirror-to-gitee.yml will pick up the changes."
          fi
