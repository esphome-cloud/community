name: Auto-Reply Poll

# Phase 1 Task 1.3 (ADR-009 Path A2 sub-option a): poll the founder's
# primary inbox for forwarded mail to esphome.cloud aliases and reply
# with byte-equal fixture bodies via Resend SMTP.
#
# Security note: this workflow consumes NO untrusted github.event.* input.
# All values come from secrets / vars and are passed via env: per the
# secure pattern documented at https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
#
# Cron cadence: every 5 minutes. GH Actions may delay scheduled runs
# under load; worst-case lag = ImprovMX forward (~30s) + GH cron drift
# (up to ~5 min) ≈ 5-6 min. Looser than ADR-009 V1's 60s target — V1
# is reconsidered at the next monthly review if real lag exceeds spec.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

# Serialise to prevent two cron ticks racing on the same INBOX.
concurrency:
  group: auto-reply-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: install dependencies
        run: pip install -r scripts/requirements.txt

      - name: poll + auto-reply
        env:
          # Inbound — IMAP_HOST + IMAP_USER are non-sensitive defaults;
          # operators can override by setting repo vars of the same name.
          IMAP_HOST: ${{ vars.IMAP_HOST || 'imap.163.com' }}
          IMAP_USER: ${{ vars.IMAP_USER || 'ff4415@163.com' }}
          IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
          # Outbound — same secrets the AI triage workflow uses.
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python scripts/auto_reply_poll.py
